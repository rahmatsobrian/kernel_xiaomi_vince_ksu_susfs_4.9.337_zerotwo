name: Build test

on:
  workflow_dispatch:
  watch:
    types: [started]

defaults:
  run:
    shell: bash

jobs:
  buildtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Install Packages
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            dialog bash sed wget git curl zip tar jq expect make cmake automake autoconf \
            llvm lld lldb clang gcc binutils bison perl gperf gawk flex bc python3 zstd \
            openssl unzip cpio build-essential ccache liblz4-tool libsdl1.2-dev libstdc++6 \
            libxml2 libxml2-utils lzop pngcrush schedtool squashfs-tools xsltproc zlib1g-dev \
            libncurses5-dev bzip2 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf \
            gcc-arm-linux-gnueabi dos2unix kmod

      - name: Setup WeebX Clang
        run: |
          mkdir -p weebx-clang
          cd weebx-clang
            wget -q $(curl -k https://raw.githubusercontent.com/XSans0/WeebX-Clang/main/release/19.x/link.txt) -O weebx-clang.tar.gz
            tar -xf weebx-clang.tar.gz
            rm -f weebx-clang.tar.gz

      - name: Setup KernelSU Kprobes | [Hookless] | Manual
        run: |
          # (Next) curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy
          curl -LSs "https://raw.githubusercontent.com/Mr-Morat/KernelSU-Next/stable/kernel/setup.sh" | bash -s syscall
      
      - name: Patch supercall.c
        run: |
         wget -q "https://raw.githubusercontent.com/rahmatsobrian/fix/main/supercall.c" \
         -O drivers/kernelsu/supercall/supercall.c
         echo "supercall.c patched!"
        
      - name: Debug KernelSU SUSFS references
        run: |
         echo "=== Files in KernelSU-Next/kernel/ ==="
         ls KernelSU-Next/kernel/
         echo "=== Searching susfs_start_sdcard_monitor_fn ==="
         grep -rn "susfs_start_sdcard_monitor_fn" KernelSU-Next/kernel/ || echo "NOT FOUND"
         echo "=== Searching susfs_is_current_proc_umounted ==="
         grep -rn "susfs_is_current_proc_umounted" KernelSU-Next/kernel/ || echo "NOT FOUND"
         echo "=== Searching ksu_handle_umount ==="
         grep -rn "ksu_handle_umount" KernelSU-Next/kernel/ || echo "NOT FOUND"
         echo "=== Searching do_report_event ==="
         grep -rn "do_report_event" KernelSU-Next/kernel/ || echo "NOT FOUND"
         echo "=== Searching do_manage_mark ==="
         grep -rn "do_manage_mark" KernelSU-Next/kernel/ || echo "NOT FOUND"
         echo "=== Searching current_sid ==="
         grep -rn "current_sid" KernelSU-Next/kernel/ || echo "NOT FOUND"
         echo "=== susfs.h includes in KernelSU ==="
         grep -rn "susfs" KernelSU-Next/kernel/ | grep -v ".o:" | head -50
         echo "=== core_hook.c SUSFS section ==="
         grep -n "susfs\|SUSFS" KernelSU-Next/kernel/core_hook.c | head -50
      
      - name: Start Build (with log)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p logs
          bash buildclang.sh 2>&1 | tee logs/build.txt

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: logs/build.txt

      - name: Upload AnyKernel Zip
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: anykernel-zip
          path: AnyKernel/*.zip

      - name: Upload Kernel Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: image-gz
          path: out/arch/arm64/boot/Image.gz

      - name: Upload DTB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: image-gz-dtb
          path: out/arch/arm64/boot/Image.gz-dtb
