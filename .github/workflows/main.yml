name: Build test

on:
  workflow_dispatch:
  watch:
    types: [started]

defaults:
  run:
    shell: bash

jobs:
  buildtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Install Packages
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            dialog bash sed wget git curl zip tar jq expect make cmake automake autoconf \
            llvm lld lldb clang gcc binutils bison perl gperf gawk flex bc python3 zstd \
            openssl unzip cpio build-essential ccache liblz4-tool libsdl1.2-dev libstdc++6 \
            libxml2 libxml2-utils lzop pngcrush schedtool squashfs-tools xsltproc zlib1g-dev \
            libncurses5-dev bzip2 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf \
            gcc-arm-linux-gnueabi dos2unix kmod

      - name: Setup WeebX Clang
        run: |
          mkdir -p weebx-clang
          cd weebx-clang
            wget -q $(curl -k https://raw.githubusercontent.com/XSans0/WeebX-Clang/main/release/19.x/link.txt) -O weebx-clang.tar.gz
            tar -xf weebx-clang.tar.gz
            rm -f weebx-clang.tar.gz

      - name: Setup KernelSU Kprobes | [Hookless] | Manual
        run: |
          # (Next) curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy
          curl -LSs "https://raw.githubusercontent.com/Mr-Morat/KernelSU-Next/stable/kernel/setup.sh" | bash -s syscall
      
      - name: Patch supercall.c
        run: |
          wget -q "https://raw.githubusercontent.com/rahmatsobrian/fix/main/supercall.c" \
          -O /tmp/supercall_fix.c
          # Hapus blok susfs_enable_log
          sed -i '/#ifdef CONFIG_KSU_SUSFS_ENABLE_LOG/,/#endif/d' /tmp/supercall_fix.c
          # Patch kedua lokasi
          cp /tmp/supercall_fix.c drivers/kernelsu/supercall/supercall.c
          cp /tmp/supercall_fix.c KernelSU-Next/kernel/supercall/supercall.c
          # Verify tidak ada susfs_enable_log
          grep -n "susfs_enable_log" /tmp/supercall_fix.c || echo "OK - susfs_enable_log removed"
          echo "supercall.c patched!"  
    
      - name: Patch KernelSU for SUSFS v1.5.5 compat
        run: |
         # Fix dispatch.c - hapus susfs_start_sdcard_monitor_fn
         sed -i 's/susfs_start_sdcard_monitor_fn();/\/\/ susfs_start_sdcard_monitor_fn(); \/\/ disabled: not in v1.5.5/g' \
         KernelSU-Next/kernel/supercall/dispatch.c
         # Fix dispatch.c - hapus susfs_is_current_proc_umounted
         sed -i 's/if (susfs_is_current_proc_umounted()) {/if (false) { \/\/ susfs_is_current_proc_umounted disabled/g' \
         KernelSU-Next/kernel/supercall/dispatch.c
         # Fix selinux.c - current_sid tidak tersedia di kernel 4.9 objsec
         # Wrap dengan #ifdef
         sed -i 's/return current_sid();/return 0; \/\/ current_sid not available in k4.9/g' \
         KernelSU-Next/kernel/selinux/selinux.c
         sed -i 's/return unlikely(current_sid() == susfs_zygote_sid);/return false; \/\/ disabled/g' \
         KernelSU-Next/kernel/selinux/selinux.c
         sed -i 's/return unlikely(current_sid() == susfs_ksu_sid);/return false; \/\/ disabled/g' \
         KernelSU-Next/kernel/selinux/selinux.c
         sed -i 's/return unlikely(current_sid() == susfs_init_sid);/return false; \/\/ disabled/g' \
         KernelSU-Next/kernel/selinux/selinux.c
         # Fix setuid_hook.c - hapus ksu_handle_umount call
         sed -i 's/ksu_handle_umount(new, old);/\/\/ ksu_handle_umount disabled/g' \
         KernelSU-Next/kernel/hook/setuid_hook.c
         # Fix core_hook.c - hapus ksu_handle_umount call
         sed -i 's/return ksu_handle_umount(new, old);/return 0; \/\/ ksu_handle_umount disabled/g' \
         KernelSU-Next/kernel/hook/core_hook.c
         echo "Patch applied!"
         # Verify
         grep -n "susfs_start_sdcard_monitor_fn\|susfs_is_current_proc_umounted\|current_sid()" \
         KernelSU-Next/kernel/supercall/dispatch.c \
         KernelSU-Next/kernel/selinux/selinux.c
      
      - name: Start Build (with log)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p logs
          bash buildclang.sh 2>&1 | tee logs/build.txt

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: logs/build.txt

      - name: Upload AnyKernel Zip
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: anykernel-zip
          path: AnyKernel/*.zip

      - name: Upload Kernel Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: image-gz
          path: out/arch/arm64/boot/Image.gz

      - name: Upload DTB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: image-gz-dtb
          path: out/arch/arm64/boot/Image.gz-dtb
          
